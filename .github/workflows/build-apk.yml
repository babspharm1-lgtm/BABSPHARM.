name: Build BABSPHARM Cloud APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x BabspharmCloud/gradlew

      - name: Build Debug APK
        run: |
          cd BabspharmCloud
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: mv BabspharmCloud/app/build/outputs/apk/debug/app-debug.apk babscloud.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: babscloud-apk
          path: babscloud.apk
          retention-days: 90

      - name: Commit APK to repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add babscloud.apk
          git diff --staged --quiet || git commit -m "🤖 Auto-build: babscloud.apk updated"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
