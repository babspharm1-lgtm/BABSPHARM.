name: Build BABSPHARM Cloud APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Project
        run: |
          mkdir -p BabspharmCloud/app/src/main/java/com/babspharm/cloud
          mkdir -p BabspharmCloud/app/src/main/res/layout
          mkdir -p BabspharmCloud/app/src/main/res/values
          mkdir -p BabspharmCloud/app/src/main/res/mipmap-hdpi
          mkdir -p BabspharmCloud/app/src/main/res/mipmap-mdpi
          mkdir -p BabspharmCloud/app/src/main/res/mipmap-xhdpi
          mkdir -p BabspharmCloud/app/src/main/res/mipmap-xxhdpi
          mkdir -p BabspharmCloud/app/src/main/res/mipmap-xxxhdpi
          mkdir -p BabspharmCloud/gradle/wrapper

          # settings.gradle
          cat > BabspharmCloud/settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "BabspharmCloud"
include ':app'
EOF

          # root build.gradle
          cat > BabspharmCloud/build.gradle << 'EOF'
plugins {
    id 'com.android.application' version '8.2.0' apply false
}
EOF

          # app/build.gradle
          cat > BabspharmCloud/app/build.gradle << 'EOF'
plugins {
    id 'com.android.application'
}
android {
    namespace 'com.babspharm.cloud'
    compileSdk 34
    defaultConfig {
        applicationId "com.babspharm.cloud"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
EOF

          # gradle wrapper properties
          cat > BabspharmCloud/gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

          # AndroidManifest.xml
          cat > BabspharmCloud/app/src/main/AndroidManifest.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.babspharm.cloud">
    <uses-permission android:name="android.permission.INTERNET"/>
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="@string/app_name"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:supportsRtl="true"
        android:theme="@style/AppTheme"
        android:hardwareAccelerated="true">
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:configChanges="orientation|screenSize|keyboardHidden"
            android:screenOrientation="portrait"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF

          # MainActivity.java
          cat > BabspharmCloud/app/src/main/java/com/babspharm/cloud/MainActivity.java << 'EOF'
package com.babspharm.cloud;
import android.app.Activity;
import android.content.Intent;
import android.net.Uri;
import android.os.Bundle;
import android.view.KeyEvent;
import android.view.View;
import android.view.Window;
import android.view.WindowManager;
import android.webkit.GeolocationPermissions;
import android.webkit.PermissionRequest;
import android.webkit.ValueCallback;
import android.webkit.WebChromeClient;
import android.webkit.WebResourceRequest;
import android.webkit.WebSettings;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.widget.ProgressBar;
public class MainActivity extends Activity {
    private WebView webView;
    private ProgressBar progressBar;
    private static final String APP_URL = "https://babspharm1-lgtm.github.io/BABSPHARM./";
    private ValueCallback<Uri[]> filePathCallback;
    private static final int FILE_CHOOSER_REQUEST = 1;
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        requestWindowFeature(Window.FEATURE_NO_TITLE);
        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
        setContentView(R.layout.activity_main);
        progressBar = findViewById(R.id.progressBar);
        webView = findViewById(R.id.webView);
        WebSettings settings = webView.getSettings();
        settings.setJavaScriptEnabled(true);
        settings.setDomStorageEnabled(true);
        settings.setDatabaseEnabled(true);
        settings.setAllowFileAccess(true);
        settings.setUseWideViewPort(true);
        settings.setLoadWithOverviewMode(true);
        settings.setSupportZoom(false);
        settings.setCacheMode(WebSettings.LOAD_DEFAULT);
        settings.setMediaPlaybackRequiresUserGesture(false);
        webView.setWebViewClient(new WebViewClient() {
            @Override
            public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                String url = request.getUrl().toString();
                if (!url.contains("babspharm1-lgtm.github.io") && !url.startsWith("javascript:") && (url.startsWith("http://") || url.startsWith("https://"))) {
                    startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url)));
                    return true;
                }
                return false;
            }
            @Override
            public void onPageFinished(WebView view, String url) { progressBar.setVisibility(View.GONE); }
        });
        webView.setWebChromeClient(new WebChromeClient() {
            @Override
            public void onProgressChanged(WebView view, int progress) {
                progressBar.setVisibility(progress < 100 ? View.VISIBLE : View.GONE);
                progressBar.setProgress(progress);
            }
            @Override
            public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCb, FileChooserParams params) {
                if (filePathCallback != null) filePathCallback.onReceiveValue(null);
                filePathCallback = filePathCb;
                try { startActivityForResult(params.createIntent(), FILE_CHOOSER_REQUEST); } catch (Exception e) { filePathCallback = null; return false; }
                return true;
            }
            @Override
            public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) { callback.invoke(origin, true, false); }
            @Override
            public void onPermissionRequest(PermissionRequest request) { request.grant(request.getResources()); }
        });
        webView.loadUrl(APP_URL);
    }
    @Override
    protected void onActivityResult(int requestCode, int resultCode, Intent data) {
        if (requestCode == FILE_CHOOSER_REQUEST && filePathCallback != null) {
            Uri[] results = (resultCode == Activity.RESULT_OK && data != null && data.getDataString() != null) ? new Uri[]{Uri.parse(data.getDataString())} : null;
            filePathCallback.onReceiveValue(results);
            filePathCallback = null;
        }
    }
    @Override
    public boolean onKeyDown(int keyCode, KeyEvent event) {
        if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) { webView.goBack(); return true; }
        return super.onKeyDown(keyCode, event);
    }
}
EOF

          # Layout
          cat > BabspharmCloud/app/src/main/res/layout/activity_main.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent" android:layout_height="match_parent" android:background="#0a0919">
    <WebView android:id="@+id/webView" android:layout_width="match_parent" android:layout_height="match_parent"/>
    <ProgressBar android:id="@+id/progressBar" style="?android:attr/progressBarStyleHorizontal"
        android:layout_width="match_parent" android:layout_height="4dp"
        android:layout_alignParentTop="true" android:progressTint="#7c3aed"
        android:visibility="gone" android:max="100"/>
</RelativeLayout>
EOF

          # strings.xml
          cat > BabspharmCloud/app/src/main/res/values/strings.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources><string name="app_name">BABSPHARM Cloud</string></resources>
EOF

          # colors.xml
          cat > BabspharmCloud/app/src/main/res/values/colors.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="purple_primary">#7c3aed</color>
    <color name="background">#0a0919</color>
</resources>
EOF

          # styles.xml
          cat > BabspharmCloud/app/src/main/res/values/styles.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="android:Theme.Material.NoTitleBar.Fullscreen">
        <item name="android:windowBackground">@color/background</item>
        <item name="android:statusBarColor">@color/purple_primary</item>
    </style>
</resources>
EOF

          # Icons for all densities
          for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            cat > BabspharmCloud/app/src/main/res/mipmap-$density/ic_launcher.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <solid android:color="#7c3aed"/>
    <corners android:radius="20dp"/>
</shape>
EOF
            cp BabspharmCloud/app/src/main/res/mipmap-$density/ic_launcher.xml \
               BabspharmCloud/app/src/main/res/mipmap-$density/ic_launcher_round.xml
          done

          # Download gradle wrapper jar
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o BabspharmCloud/gradle/wrapper/gradle-wrapper.jar || echo "jar download attempted"

          # gradlew
          cat > BabspharmCloud/gradlew << 'EOF'
#!/bin/sh
CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
exec "$JAVACMD" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
EOF
          chmod +x BabspharmCloud/gradlew

      - name: Setup Gradle Wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: |
          cd BabspharmCloud
          gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: mv BabspharmCloud/app/build/outputs/apk/debug/app-debug.apk babscloud.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: babscloud-apk
          path: babscloud.apk
          retention-days: 90

      - name: Commit APK to repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add babscloud.apk
          git diff --staged --quiet || git commit -m "ðŸ¤– Auto-build: babscloud.apk updated"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
