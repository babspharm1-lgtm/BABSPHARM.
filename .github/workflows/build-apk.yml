name: Build BABSPHARM Cloud APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          cd app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Copy APK to root
        run: cp app/app/build/outputs/apk/debug/app-debug.apk babscloud.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BABSPHARM-APK
          path: babscloud.apk
          retention-days: 90

      - name: Commit APK to repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -f babscloud.apk
          git diff --staged --quiet || git commit -m "🤖 Auto-build: babscloud.apk updated"
          git push
